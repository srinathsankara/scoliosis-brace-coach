<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Session History</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">Session History</h1>
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-200">
                    <th class="p-2 border">Job ID</th>
                    <th class="p-2 border">Date</th>
                    <th class="p-2 border">Mode</th>
                    <th class="p-2 border">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for session in sessions %}
                <tr>
                    <td class="p-2 border font-mono text-sm">{{ session[0] }}</td>
                    <td class="p-2 border">{{ session[1] }}</td>
                    <td class="p-2 border capitalize">{{ session[2].replace('_', ' ') }}</td>
                    <td class="p-2 border"><a href="/results/{{ session[0] }}" class="text-blue-500 hover:underline">View</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="mt-8">
            <a href="/" class="text-blue-500 hover:underline">Back to Home</a>
        </div>
    </div>
</body>
</html>
