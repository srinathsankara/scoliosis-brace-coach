name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please help us understand what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a limitation you're experiencing?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area does this feature relate to?
      options:
        - Pose Estimation / Computer Vision
        - Brace Detection / Pressure Sensing
        - Posture / Gait Analysis
        - Trunk Rotation / Rib Hump
        - Trend Analysis / Progression Tracking
        - Clinician Dashboard / Reports
        - BLE Sensor Integration
        - UI/UX Improvements
        - Educational Content
        - Testing / Quality
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: research
    attributes:
      label: Supporting Research
      description: If applicable, link to research papers, clinical guidelines, or standards that support this feature.
      placeholder: "e.g. BrAIST study, SRS guidelines..."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or screenshots for the feature request.
    validations:
      required: false
